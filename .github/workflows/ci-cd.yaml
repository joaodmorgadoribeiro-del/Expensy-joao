# .github/workflows/ci-cd.yaml
name: Expensy CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  ACR_REGISTRY: expensynacr.azurecr.io
  FRONTEND_IMAGE: expensy-app
  BACKEND_IMAGE: expensy-backend
  AKS_CLUSTER: joaocluster
  RESOURCE_GROUP: joao-rg
  HELM_RELEASE: expensy
  NAMESPACE: expensy

jobs:
  # ============================================================
  # JOB 1 - BUILD & TEST FRONTEND
  # ============================================================
  build-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./expensy_frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: expensy_frontend/package-lock.json
      - run: npm install
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ============================================================
  # JOB 2 - BUILD & TEST BACKEND
  # ============================================================
  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./expensy_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: expensy_backend/package-lock.json
      - run: npm install
      - run: npm run build
      - run: npm test --if-present
  
  # ============================================================
  # JOB 4 - SONARQUBE ANALYSIS
  # ============================================================
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan - Backend
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: ./expensy_backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: SonarQube Scan - Frontend
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: ./expensy_frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ============================================================
  # JOB 5 - DOCKER BUILD & PUSH (main only)
  # ============================================================
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend, sonarqube]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./expensy_frontend
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.ACR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./expensy_backend
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}

  # ============================================================
  # JOB 5 - DEPLOY TO AKS (main only)
  # ============================================================
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: [docker-build-push, sonarqube]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Deploy summary
        run: |
          echo "================================================"
          echo "✅ Images pushed to ACR!"
          echo "Frontend: ${{ env.ACR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}"
          echo "Backend:  ${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}"
          echo "================================================"
          echo "▶ Run manually to deploy to AKS:"
          echo "helm upgrade expensy ./k8s/expensy-chart -n expensy"
          echo "================================================"
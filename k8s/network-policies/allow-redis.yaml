apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis
  namespace: expensy
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: expensy-backend
      ports:
        - protocol: TCP
          port: 6379
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
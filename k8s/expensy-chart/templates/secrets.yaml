apiVersion: v1
kind: Secret
metadata:
  name: expensy-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  MONGO_USERNAME: {{ .Values.secrets.mongoUsername | quote }}
  MONGO_PASSWORD: {{ .Values.secrets.mongoPassword | quote }}
  MONGO_INITDB_ROOT_USERNAME: {{ .Values.secrets.mongoUsername | quote }}
  MONGO_INITDB_ROOT_PASSWORD: {{ .Values.secrets.mongoPassword | quote }}
  DATABASE_URI: "mongodb://{{ .Values.secrets.mongoUsername }}:{{ .Values.secrets.mongoPassword }}@{{ .Values.mongo.name }}:{{ .Values.mongo.port }}/{{ .Values.mongo.database }}?authSource=admin"
  MONGODB_URI: "mongodb://{{ .Values.secrets.mongoUsername }}:{{ .Values.secrets.mongoPassword }}@{{ .Values.mongo.name }}:{{ .Values.mongo.port }}/{{ .Values.mongo.database }}?authSource=admin"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
  REDIS_URL: "redis://:{{ .Values.secrets.redisPassword }}@{{ .Values.redis.name }}:{{ .Values.redis.port }}"
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  NEXTAUTH_SECRET: {{ .Values.secrets.nextauthSecret | quote }}
  NEXTAUTH_URL: {{ .Values.secrets.nextauthUrl | quote }}
  SONAR_DB_USER: {{ .Values.secrets.sonarDbUser | quote }}
  SONAR_DB_PASSWORD: {{ .Values.secrets.sonarDbPassword | quote }}